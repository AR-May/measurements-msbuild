<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSBuild Performance Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
    <style>
        :root {
            --bg: #ffffff;
            --surface: #f6f8fa;
            --border: #d0d7de;
            --text: #1f2328;
            --text-muted: #656d76;
            --accent: #0969da;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0d1117;
                --surface: #161b22;
                --border: #30363d;
                --text: #e6edf3;
                --text-muted: #8b949e;
                --accent: #58a6ff;
            }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
        }
        header h1 { font-size: 20px; font-weight: 600; }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }
        .controls {
            display: flex;
            gap: 24px;
            align-items: flex-start;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        .control-group { display: flex; flex-direction: column; gap: 6px; }
        .control-group > span {
            font-weight: 600;
            font-size: 14px;
        }
        .metric-toggle {
            display: flex;
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }
        .metric-toggle label {
            padding: 6px 16px;
            font-size: 14px;
            cursor: pointer;
            border-right: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-muted);
            transition: background 0.15s, color 0.15s;
            user-select: none;
        }
        .metric-toggle label:last-child { border-right: none; }
        .metric-toggle input { display: none; }
        .metric-toggle input:checked + label {
            background: var(--accent);
            color: #fff;
        }
        .test-list-wrapper {
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface);
            max-height: 220px;
            min-width: 340px;
            overflow-y: auto;
        }
        .test-list-actions {
            display: flex;
            gap: 8px;
            padding: 6px 10px;
            border-bottom: 1px solid var(--border);
        }
        .test-list-actions button {
            font-size: 12px;
            padding: 2px 8px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--bg);
            color: var(--text-muted);
            cursor: pointer;
        }
        .test-list-actions button:hover { color: var(--text); }
        .test-list {
            list-style: none;
            padding: 4px 0;
        }
        .test-list li {
            padding: 3px 10px;
        }
        .test-list li:hover { background: var(--bg); }
        .test-list label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            cursor: pointer;
        }
        .test-list input[type="checkbox"] { accent-color: var(--accent); }
        .chart-wrapper {
            position: relative;
            width: 100%;
            height: 450px;
            margin-bottom: 32px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th, td {
            padding: 8px 12px;
            text-align: right;
            border-bottom: 1px solid var(--border);
        }
        th {
            background: var(--surface);
            font-weight: 600;
            position: sticky;
            top: 0;
        }
        th:first-child, td:first-child { text-align: left; }
        tr:hover td { background: var(--surface); }
        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 48px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <header>
        <h1>📊 MSBuild Performance Dashboard</h1>
    </header>
    <div class="container">
        <div class="controls">
            <div class="control-group">
                <span>Metric</span>
                <div class="metric-toggle">
                    <input type="radio" name="metric" id="metricBuild" value="buildTime" checked>
                    <label for="metricBuild">Build Time</label>
                    <input type="radio" name="metric" id="metricEval" value="evalTime">
                    <label for="metricEval">Eval Time</label>
                </div>
            </div>
            <div class="control-group">
                <span>Tests</span>
                <div class="test-list-wrapper">
                    <div class="test-list-actions">
                        <button id="btnSelectAll">Select All</button>
                        <button id="btnSelectNone">Select None</button>
                    </div>
                    <ul class="test-list" id="testList"></ul>
                </div>
            </div>
        </div>
        <div class="chart-wrapper">
            <canvas id="chart"></canvas>
        </div>
        <div id="tableContainer"></div>
    </div>

    <script>
    (async function() {
        const resp = await fetch('data.json');
        const data = await resp.json();

        const testNames = [...new Set(data.map(r => r.test))].sort();
        const machines = [...new Set(data.map(r => r.machine))].sort();

        // Distinct color palette (enough for many test×machine combos)
        const PALETTE = [
            '#2da44e', '#0969da', '#bf3989', '#e3b341', '#8250df',
            '#cf222e', '#0550ae', '#116329', '#953800', '#54aeff',
            '#d4a72c', '#ff7b72', '#7ee787', '#a5d6ff', '#f778ba',
            '#d2a8ff', '#ffa657', '#79c0ff', '#56d364', '#ff9bce',
        ];

        // Build test checkbox list
        const testList = document.getElementById('testList');
        testNames.forEach((name, i) => {
            const li = document.createElement('li');
            const label = document.createElement('label');
            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.value = name;
            if (i === 0) cb.checked = true;
            cb.addEventListener('change', render);
            label.appendChild(cb);
            label.appendChild(document.createTextNode(name));
            li.appendChild(label);
            testList.appendChild(li);
        });

        document.getElementById('btnSelectAll').addEventListener('click', () => {
            testList.querySelectorAll('input').forEach(cb => cb.checked = true);
            render();
        });
        document.getElementById('btnSelectNone').addEventListener('click', () => {
            testList.querySelectorAll('input').forEach(cb => cb.checked = false);
            render();
        });

        document.querySelectorAll('input[name="metric"]').forEach(r => r.addEventListener('change', render));

        const ctx = document.getElementById('chart').getContext('2d');
        let chart = null;

        function parseDate(dateStr) {
            const y = parseInt(dateStr.substring(0, 4));
            const m = parseInt(dateStr.substring(4, 6)) - 1;
            const d = parseInt(dateStr.substring(6, 8));
            return new Date(y, m, d);
        }

        function formatDate(dateStr) {
            const dt = parseDate(dateStr);
            return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function getSelectedTests() {
            return [...testList.querySelectorAll('input:checked')].map(cb => cb.value);
        }

        function getSelectedMetric() {
            return document.querySelector('input[name="metric"]:checked').value;
        }

        function getMetricLabel() {
            return getSelectedMetric() === 'buildTime' ? 'Build Time' : 'Eval Time';
        }

        function render() {
            const selectedTests = getSelectedTests();
            const metric = getSelectedMetric();

            const filtered = data.filter(r => selectedTests.includes(r.test));
            const allDates = [...new Set(filtered.map(r => r.date))].sort();

            // Build lookup: test -> machine -> date -> record
            const lookup = {};
            filtered.forEach(r => {
                if (!lookup[r.test]) lookup[r.test] = {};
                if (!lookup[r.test][r.machine]) lookup[r.test][r.machine] = {};
                lookup[r.test][r.machine][r.date] = r;
            });

            const datasets = [];
            let colorIdx = 0;

            selectedTests.forEach(test => {
                machines.forEach(machine => {
                    if (!lookup[test]?.[machine]) return;

                    const seriesData = allDates.map(d => {
                        const rec = lookup[test]?.[machine]?.[d];
                        const val = rec?.[metric] ?? null;
                        return { x: parseDate(d), y: val };
                    }).filter(p => p.y !== null);

                    if (seriesData.length === 0) return;

                    const color = PALETTE[colorIdx % PALETTE.length];
                    const isDashed = machine === machines[1];
                    colorIdx++;

                    datasets.push({
                        label: `${test} (${machine})`,
                        data: seriesData,
                        borderColor: color,
                        backgroundColor: color + '1a',
                        borderWidth: 2,
                        pointRadius: 4,
                        tension: 0.1,
                        spanGaps: true,
                        borderDash: isDashed ? [6, 3] : [],
                    });
                });
            });

            if (chart) chart.destroy();

            chart = new Chart(ctx, {
                type: 'line',
                data: { datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: c => `${c.dataset.label}: ${c.parsed.y?.toFixed(1)} ms`
                            }
                        },
                        legend: {
                            position: 'top',
                            labels: { boxWidth: 16, font: { size: 11 } },
                        },
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: { unit: 'day', tooltipFormat: 'MMM d, yyyy' },
                            title: { display: true, text: 'Date' },
                            grid: { color: 'rgba(128,128,128,0.1)' },
                        },
                        y: {
                            title: { display: true, text: `${getMetricLabel()} (ms)` },
                            beginAtZero: false,
                            grid: { color: 'rgba(128,128,128,0.1)' },
                        }
                    }
                }
            });

            updateTable(selectedTests, allDates, machines, lookup, metric);
        }

        function updateTable(selectedTests, dates, machines, lookup, metric) {
            const container = document.getElementById('tableContainer');
            if (selectedTests.length === 0 || dates.length === 0) {
                container.innerHTML = '<div class="empty-state">Select one or more tests to view data.</div>';
                return;
            }

            const metricLabel = getMetricLabel();
            let html = '<table><thead><tr><th>Date</th>';
            selectedTests.forEach(test => {
                machines.forEach(m => {
                    html += `<th>${test}<br><small>(${m})</small></th>`;
                });
            });
            html += '</tr></thead><tbody>';

            dates.forEach(d => {
                html += `<tr><td>${formatDate(d)}</td>`;
                selectedTests.forEach(test => {
                    machines.forEach(m => {
                        const rec = lookup[test]?.[m]?.[d];
                        const val = rec?.[metric];
                        html += `<td>${val != null ? val.toFixed(1) : '—'}</td>`;
                    });
                });
                html += '</tr>';
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // Initial render
        render();
    })();
    </script>
</body>
</html>
